#data configs
data:
  exchange: "binance"
  symbols: 
    - "BTC/USDT"
    # - "ETH/USDT" # add more symbols as needed
  timeframe: "1h"
  total_years: 5
  start_date: "2020-07-01"
  end_date: "2025-07-01"
  max_fill_candles: 2
  #anomaly detection configs
  anomaly_detection:
    rolling_window: 30
    wick_multiplier: 5.0
    wick_percent: 0.75

#feature configs
features:
  selected_features:
    - log_return
    - log_return_6h
    - RSI
    - EMA_ratio
    - ADX
    - ATR_pct
    - volatility_ratio
    - close_location
    - distance_from_high_24h
    - distance_from_low_24h
    - body_pct
    - volume_zscore
    - OBV_zscore
    - rolling_sharpe
    - up_streak
    - wick_anomaly_flag

  price:
    log_return_short_period: 1   
    log_return_long_period: 6
    ema_window: 20              
    dist_high_low_window: 24

  momentum:
    rsi_window: 14
    adx_window: 14

  volatility:
    atr_window: 14                 
    vol_ratio_short_window: 24     
    vol_ratio_long_window: 72      
    sharpe_window: 24              
    periods_per_year: 8760 

  volume:
    zscore_window: 20 

#path configs
paths:
  raw_dir:       data/raw
  processed_dir:  data/processed
  feature_engineered_dir: data/features
  logs_dir:      logs
  feature_graphs_dir:    graphs/features

#env configs
env:
  window_len: 48
  max_trade_step: 0.2
  transaction_cost_rate: 0.0005
  max_drawdown: 0.3
  initial_capital: 10000.0
  
risk:
  stop_loss_atr_multiple: 1.5
  take_profit_atr_multiple: 3.0
  target_atr_pct: 1.0

portfolio:
  initial_capital: 10000.0    # single shared pool
  assets:
    - symbol: "BTC/USDT"
      min_trade_notional: 10.0
  rebalance:
    min_rebalance_delta: 0.01
  risk:
    max_drawdown: 0.3

  long:                        # was top-level portfolio.fees / portfolio.slippage
    fees: {maker_fee_rate: 0.0005, taker_fee_rate: 0.0005}
    slippage: {model: "fixed_bps", fixed_bps: 5.0}

  short:                       # was portfolio.futures
    leverage: 3.0
    maintenance_margin_ratio: 0.05
    funding_rate_per_step: 0.0
    fees: {maker_fee_rate: 0.0002, taker_fee_rate: 0.0004}
    slippage: {model: "fixed_bps", fixed_bps: 5.0}

#reward configs
reward:
  sharpe_window: 100
  step_return_weight: 1.0
  sharpe_weight: 0.10
  drawdown_penalty_scale: 0.1
  overtrade_penalty_scale: 0.01
  # Number of steps summed into one sample before it enters the rolling
  # Sharpe buffer (see src/env/rewards.py). 1 = old per-step behavior;
  # raised to 12 so each sample reflects sustained return over ~12 steps
  # rather than single-timestep noise. Tunable, and included in the
  # Optuna search space (src/agent/hpo.py) as `sharpe_aggregation_steps`.
  sharpe_aggregation_steps: 12
  # Raised from 2: with aggregation_steps=12, min_buffer_size=2 means
  # only 2 aggregated (24-step) samples before the ratio is trusted --
  # still thin. 5 aggregated samples (~60 steps of history) is a more
  # reasonable floor before the Sharpe term starts contributing.
  min_buffer_size: 5
  epsilon: 0.01


training:

  seed: 42

  device: cuda

  timesteps: 100000

  checkpoint_frequency: 25000

  evaluation_frequency: 25000

  log_interval: 10

  tensorboard: true

  deterministic_eval: true

  keep_last_n: 5

  save_best_model: true

  resume_checkpoint:

  resume_experiment:

ppo:
  policy: MlpLstmPolicy

  learning_rate: 3.0e-4
  n_steps: 256
  batch_size: 64
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.02
  vf_coef: 0.5
  max_grad_norm: 0.5

  policy_kwargs:
    net_arch:
      pi: [256, 128, 64]
      vf: [256, 128, 64]

    activation_fn: ReLU
    ortho_init: true

    lstm_hidden_size: 256
    n_lstm_layers: 1
    shared_lstm: false
    enable_critic_lstm: true

evaluation:

  risk_free_rate: 0.0

  periods_per_year: 6048

  rolling_sharpe_window: 252

  deterministic: true

  render: false

  save_equity_curve: true

  save_trade_log: true

  save_portfolio_history: true

  save_trade_history: true

  benchmark_buy_hold: true

  benchmark_random: true

  benchmark_cash: true

  generate_plots: true

  generate_report: true
